name: mobile
description: "Flow Support - Staff Messaging App"
publish_to: 'none'
version: 1.0.0+17

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.0
  dio: ^5.4.0
  socket_io_client: ^3.0.0
  go_router: ^14.0.0
  shared_preferences: ^2.2.0
  sqflite: ^2.3.0
  path: ^1.9.0
  cached_network_image: ^3.3.0
  emoji_picker_flutter: ^2.1.0
  intl: ^0.19.0
  json_annotation: ^4.9.0
  image_picker: ^1.1.0
  file_picker: ^8.0.0
  audio_waveforms: ^1.2.0
  audioplayers: ^6.0.0
  permission_handler: ^11.3.0
  path_provider: ^2.1.0
  open_filex: ^4.5.0
  http_parser: ^4.1.0
  flutter_contacts: ^2.0.0
  image_gallery_saver_plus: ^4.0.0
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.0
  flutter_local_notifications: ^18.0.0
  camera: ^0.10.6
  photo_manager: ^3.5.0
  photo_manager_image_provider: ^2.2.0
  url_launcher: ^6.2.0
  share_plus: ^10.0.0
  video_player: ^2.9.0
  chewie: ^1.8.0
  any_link_preview: ^3.0.0
  flutter_image_compress: ^2.3.0
  video_compress: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.8.0
  flutter_launcher_icons: ^0.14.0
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#0B141A"
  adaptive_icon_foreground: "assets/icon_foreground.png"

flutter_native_splash:
  color: "#0B0B0B"
  image: "assets/splash_logo.png"
  android_12:
    color: "#0B0B0B"
    icon_background_color: "#0B0B0B"
    image: "assets/splash_logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
